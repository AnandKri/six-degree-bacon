<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Six Degree Bacon</title>
<style>
  /* Minimal-terminal theme: dark slate, single teal accent, mono chrome, square corners, no
     gradients. Colours are CSS variables so `build-site --theme` can re-skin without a new template.
     Realm tints (--world..--belief) are display-only groupings of the 10 domains; teal (--accent) is
     reserved for the discovered route. Fonts name JetBrains Mono / Roboto first, falling back to
     system mono/sans (the page loads no external assets — the CSP-free, self-contained rule). */
  :root {
    color-scheme: dark;
    --bg: #0f172a;        /* slate-900  page */
    --panel: #1e293b;     /* slate-800  cards / inputs */
    --border: #334155;    /* slate-700  dividers / cards */
    --border-2: #475569;  /* slate-600  pills */
    --faint: #64748b;     /* slate-500  footer / faint */
    --muted: #94a3b8;     /* slate-400  secondary */
    --fg: #e2e8f0;        /* slate-200  primary */
    --white: #ffffff;
    --accent: #5eead4;    /* teal-300  the only accent — the discovered route */
    --accent-2: #99f6e4;  /* teal-200 */
    --edge: #263449;      /* faint link */
    --nlabel-fill: var(--fg);  /* node-label ink; muted while exploring a minimized card */
    /* 5 realm tints — teal-harmonized, validated dark all-pairs (worst CVD dE 11.5) */
    --world: #4d9bf0; --expression: #d99a3e; --knowledge: #0f8f18; --power: #ef5f6b; --belief: #d857a3;
    /* Not a realm: the `other` domain (unmapped harvest fallout, ADR 0032). Deliberately a neutral
       grey so unclassified nodes read as absence-of-classification, never as a 6th territory. */
    --unclassified: #64748b;
    --font-mono: "JetBrains Mono", ui-monospace, "Cascadia Mono", "Cascadia Code", Consolas, "SFMono-Regular", Menlo, monospace;
    --font-sans: "Roboto", system-ui, -apple-system, "Segoe UI", Arial, sans-serif;
    --glow: 0 0 8px -1px rgba(94,234,212,.55);
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--fg); font-family: var(--font-sans);
    -webkit-font-smoothing: antialiased; }

  .stage { position: fixed; inset: 0; overflow: hidden; background: var(--bg); }
  svg#map { width: 100%; height: 100%; display: block; touch-action: none; cursor: grab; }
  svg#map.grabbing { cursor: grabbing; }
  svg#map.focused .node { opacity: .18; transition: opacity .45s ease; }
  svg#map.focused .node.on { opacity: 1; }
  svg#map.focused .edge { opacity: .04; }
  svg#map.focused .territory { opacity: .45; }
  svg#map.focused .dlabel { opacity: .22; }

  /* The stroke rounds the hull corners and pads each territory into a soft blob; it also inflates
     the hull by ~half its width on every side, so a big stroke reads as heavy overlap between
     neighbours. Kept modest (ADR 0040) now that the layout spreads territories apart structurally —
     enough padding to feel like a region, not so much that adjacent realms bleed together. */
  .territory { stroke-width: 34; stroke-linejoin: round; paint-order: stroke;
    fill-opacity: .12; stroke-opacity: .28; transition: opacity .45s ease; }
  .t-world { fill: var(--world); stroke: var(--world); }
  .t-expression { fill: var(--expression); stroke: var(--expression); }
  .t-knowledge { fill: var(--knowledge); stroke: var(--knowledge); }
  .t-power { fill: var(--power); stroke: var(--power); }
  .t-belief { fill: var(--belief); stroke: var(--belief); }
  .t-unclassified { fill: var(--unclassified); stroke: var(--unclassified); }
  .dlabel { font-family: var(--font-mono); font-weight: 600; letter-spacing: .26em;
    text-transform: uppercase; text-anchor: middle; fill-opacity: .85; pointer-events: none;
    transition: opacity .45s ease; }
  .dl-world { fill: var(--world); } .dl-expression { fill: var(--expression); }
  .dl-knowledge { fill: var(--knowledge); } .dl-power { fill: var(--power); }
  .dl-belief { fill: var(--belief); } .dl-unclassified { fill: var(--unclassified); }

  .edge { stroke: var(--edge); stroke-width: 1; fill: none; transition: opacity .45s ease; }
  .edge.on { stroke: var(--accent); stroke-width: 2.2; opacity: 1 !important; }

  .node { cursor: pointer; }
  .node circle { stroke: var(--bg); stroke-width: 1.4; }
  .n-world circle { fill: var(--world); } .n-expression circle { fill: var(--expression); }
  .n-knowledge circle { fill: var(--knowledge); } .n-power circle { fill: var(--power); }
  .n-belief circle { fill: var(--belief); }
  .n-unclassified circle { fill: var(--unclassified); }
  .node.hover circle { fill: var(--accent); }
  .node.on circle { fill: var(--accent); stroke: var(--bg); filter: drop-shadow(0 0 4px rgba(94,234,212,.7)); }
  .node.origin circle { fill: var(--accent); filter: drop-shadow(0 0 6px rgba(94,234,212,.85)); }

  .nlabel { font-family: var(--font-mono); font-size: 11px; fill: var(--nlabel-fill); paint-order: stroke;
    stroke: var(--bg); stroke-width: 3.5px; stroke-linejoin: round; pointer-events: none;
    opacity: 0; transition: opacity .18s ease; }
  /* Minimized card = exploring a bright map: soften the label ink so it isn't a wall of white. */
  svg#map.explore { --nlabel-fill: #a7b1c1; }
  .nlabel.show { opacity: 1; }
  .node.on .nlabel { opacity: 1; fill: var(--accent-2); }
  .node.hover .nlabel { opacity: 1; fill: var(--white); }
  /* Touch target: an invisible hit disc enlarges the tap area, and a visible label is tappable too
     (a hidden label stays pointer-events:none so it never becomes an invisible tap trap). */
  .node .hit { fill: transparent; stroke: none; }  /* invisible tap area — no ring (see .node circle) */
  .nlabel.show, .node.on .nlabel { pointer-events: auto; }

  .route { fill: none; stroke: var(--accent); stroke-width: 2.5; stroke-linecap: round;
    stroke-linejoin: round; filter: drop-shadow(0 0 5px rgba(94,234,212,.6)); }
  .route.animate { stroke-dasharray: 8 7; animation: march 12s linear infinite; }
  @keyframes march { to { stroke-dashoffset: -300; } }
  .hop-dot { fill: var(--accent); stroke: var(--bg); stroke-width: 1.5;
    filter: drop-shadow(0 0 4px rgba(94,234,212,.7)); }
  .hop-num { font-family: var(--font-mono); font-size: 10px; font-weight: 700; fill: var(--bg);
    text-anchor: middle; dominant-baseline: central; pointer-events: none; }

  .topbar { position: fixed; top: 0; left: 0; right: 0; z-index: 20; display: flex; align-items: center;
    gap: 1rem; padding: .8rem 1.15rem; background: var(--bg); border-bottom: 1px solid var(--border);
    pointer-events: none; flex-wrap: wrap; }
  .brand { pointer-events: auto; }
  .brand h1 { font-family: var(--font-mono); font-size: 1.06rem; font-weight: 700; margin: 0;
    letter-spacing: .01em; color: var(--white); }
  .brand h1 .tl { color: var(--accent); }
  .brand h1 .cursor { color: var(--accent); animation: blink 1.1s steps(1) infinite; }
  @keyframes blink { 50% { opacity: 0; } }
  .brand p { margin: .22rem 0 0; font-family: var(--font-mono); font-size: .68rem; color: var(--faint); }

  .controls { margin-left: auto; display: flex; align-items: center; gap: .6rem; pointer-events: auto; }
  .search { position: relative; }
  .search input { width: min(28vw, 300px); min-width: 170px; font-family: var(--font-mono);
    font-size: .82rem; padding: .5rem .7rem .5rem 1.9rem; color: var(--fg); background: var(--panel);
    border: 1px solid var(--border); border-radius: 3px; transition: width .2s ease, opacity .15s ease; }
  .search input::placeholder { color: var(--faint); }
  .search input:focus { outline: none; border-color: var(--accent); box-shadow: var(--glow); }
  .search .mag { position: absolute; left: .35rem; top: 50%; transform: translateY(-50%); padding: 0;
    width: 26px; height: 26px; display: grid; place-items: center; border: 0; background: none;
    color: var(--faint); cursor: pointer; }
  .search .mag svg { width: 14px; height: 14px; stroke: currentColor; fill: none; }
  .suggest { position: absolute; top: calc(100% + 5px); left: 0; right: 0; background: var(--panel);
    border: 1px solid var(--border); border-radius: 3px; overflow: hidden; font-family: var(--font-mono);
    font-size: .8rem; display: none; z-index: 25; }
  .suggest.open { display: block; }
  .suggest button { display: block; width: 100%; text-align: left; padding: .48rem .7rem; background: none;
    border: 0; color: var(--fg); cursor: pointer; font: inherit; }
  .suggest button:hover, .suggest button.active { background: var(--bg); color: var(--accent); }
  .pill { font-family: var(--font-mono); font-size: .72rem; padding: .4rem .7rem; border-radius: 999px;
    border: 1px solid var(--border-2); background: transparent; color: var(--muted); cursor: pointer;
    white-space: nowrap; transition: color .15s, border-color .15s; }
  .pill:hover { border-color: var(--accent); color: var(--accent); }
  .pill[aria-pressed="true"] { border-color: var(--accent); color: var(--accent);
    background: rgba(94,234,212,.08); }

  .zoomdock { position: fixed; left: 1.15rem; bottom: 1.15rem; z-index: 20; display: flex;
    flex-direction: column; gap: .4rem; }
  .iconbtn { width: 34px; height: 34px; border-radius: 3px; background: transparent;
    border: 1px solid var(--border-2); color: var(--muted); cursor: pointer; font-family: var(--font-mono);
    font-size: 1rem; display: grid; place-items: center; transition: color .15s, border-color .15s, box-shadow .15s; }
  .iconbtn:hover { color: var(--accent); border-color: var(--accent); box-shadow: var(--glow); }
  .iconbtn svg { width: 15px; height: 15px; }

  .legend { position: fixed; right: 1.15rem; bottom: 1.15rem; z-index: 15; background: var(--panel);
    border: 1px solid var(--border); border-radius: 3px; padding: .65rem .8rem; font-family: var(--font-mono);
    font-size: .68rem; color: var(--muted); max-width: 220px; }
  .legend h4 { margin: 0 0 .5rem; font-size: .62rem; letter-spacing: .16em; text-transform: uppercase;
    color: var(--faint); font-weight: 700; }
  .legend .row { display: flex; align-items: center; gap: .5rem; margin: .3rem 0; }
  .legend .sw { width: 11px; height: 11px; border-radius: 3px; flex: none; opacity: .9; }
  .legend .route-row { margin-top: .5rem; padding-top: .45rem; border-top: 1px solid var(--border); }
  .legend .tealdot { width: 10px; height: 10px; border-radius: 50%; background: var(--accent); flex: none;
    box-shadow: var(--glow); }

  .hint { position: fixed; left: 50%; bottom: 1.15rem; transform: translateX(-50%); z-index: 14;
    display: flex; align-items: center; gap: .5rem; flex-wrap: wrap; justify-content: center;
    font-family: var(--font-mono); font-size: .72rem; color: var(--muted); background: var(--bg);
    border: 1px solid var(--border); border-radius: 3px; padding: .45rem .7rem; max-width: 92vw; }
  .hint .lbl { color: var(--faint); }
  .hint .stat { color: var(--accent); font-weight: 700; }
  .hint .sep { color: var(--border-2); }

  .card { position: fixed; top: 4.4rem; right: 1.15rem; z-index: 18; width: min(390px, 92vw);
    max-height: calc(100vh - 5.8rem); overflow-y: auto; background: var(--panel);
    border: 1px solid var(--border); border-radius: 3px; padding: 1.1rem 1.2rem 1.25rem;
    transform: translateX(118%); opacity: 0;
    transition: transform .4s cubic-bezier(.2,.8,.2,1), opacity .28s ease; }
  .card.open { transform: none; opacity: 1; }
  .card .close { position: absolute; top: .55rem; right: .7rem; border: 0; background: none;
    color: var(--faint); font-family: var(--font-mono); font-size: 1.15rem; cursor: pointer; line-height: 1; }
  .card .close:hover { color: var(--accent); }
  .card .cardbtn { position: absolute; top: .5rem; right: 2.3rem; border: 0; background: none;
    color: var(--faint); font-family: var(--font-mono); font-size: 1.25rem; cursor: pointer;
    line-height: 1; padding: 0 .2rem; }
  .card .cardbtn:hover { color: var(--accent); }
  /* Minimized: only the topic -> endpoint headline and the metric bars, so the map has room. */
  .card.min { cursor: pointer; padding-bottom: 1rem; }
  .card.min .seg, .card.min .meta, .card.min .til,
  .card.min .route-list, .card.min details.src { display: none; }
  .card.min h2 { font-size: 1.12rem; }
  .card.min .meters { margin-top: .7rem; }
  .seg { display: inline-flex; border: 1px solid var(--border); border-radius: 3px; overflow: hidden;
    font-family: var(--font-mono); font-size: .7rem; margin-bottom: .95rem; }
  .seg button { border: 0; background: transparent; padding: .34rem .75rem; cursor: pointer;
    color: var(--muted); font: inherit; border-right: 1px solid var(--border); }
  .seg button:last-child { border-right: 0; }
  .seg button.sel { background: rgba(94,234,212,.1); color: var(--accent); }
  .seg button:disabled { opacity: .35; cursor: default; }
  .card .meta { font-family: var(--font-mono); font-size: .68rem; color: var(--faint);
    letter-spacing: .02em; margin: 0 0 .35rem; }
  .card h2 { font-family: var(--font-sans); font-weight: 500; font-size: 1.3rem; margin: 0 0 .15rem;
    line-height: 1.2; color: var(--white); text-wrap: balance; }
  .card h2 .arrow { color: var(--faint); font-weight: 300; }
  .card h2 .dest { color: var(--accent); }
  .badge { display: inline-block; margin-left: .45rem; padding: .05rem .45rem; border-radius: 999px;
    border: 1px solid var(--border-2); color: var(--muted); font-family: var(--font-mono);
    font-size: .6rem; font-weight: 500; letter-spacing: .08em; vertical-align: middle; }
  .til { font-family: var(--font-sans); font-size: 1.04rem; line-height: 1.55; color: var(--fg);
    margin: .9rem 0 .2rem; }
  .route-list { list-style: none; margin: .95rem 0 .2rem; padding: 0; font-family: var(--font-mono);
    font-size: .76rem; }
  .route-list li { position: relative; padding: .16rem 0 .5rem 1.4rem; color: var(--fg); }
  .route-list li:not(:last-child)::after { content: ""; position: absolute; left: 6px; top: 1.15rem;
    bottom: -.15rem; width: 1px; background: var(--border); }
  .route-list .dot { position: absolute; left: 0; top: .28rem; width: 13px; height: 13px; border-radius: 50%;
    background: var(--accent); color: var(--bg); font-size: .55rem; font-weight: 700; display: grid;
    place-items: center; }
  .route-list .start .dot { background: var(--border-2); color: var(--fg); }
  .route-list .via { color: var(--faint); }
  .route-list .ev { font-family: var(--font-sans); font-size: .8rem; line-height: 1.45;
    color: var(--muted); margin: .28rem 0 .1rem; }
  .meters { display: flex; gap: 1.5rem; margin: 1.05rem 0 .2rem; font-family: var(--font-mono); }
  .meter { flex: 1; }
  .meter .lab { font-size: .62rem; letter-spacing: .1em; text-transform: uppercase; color: var(--faint);
    font-weight: 700; }
  .meter .val { font-size: 1.15rem; font-weight: 700; color: var(--fg); font-variant-numeric: tabular-nums;
    margin: .12rem 0 .3rem; }
  .bar { height: 4px; border-radius: 0; background: var(--border); overflow: hidden; }
  .bar > span { display: block; height: 100%; background: var(--accent); box-shadow: var(--glow); }
  details.src { margin-top: 1.05rem; font-family: var(--font-mono); font-size: .74rem; }
  details.src summary { cursor: pointer; color: var(--faint); }
  details.src ul { margin: .5rem 0 0; padding-left: 1.05rem; }
  details.src li { margin: .2rem 0; color: var(--muted); }
  details.src a { color: var(--accent); text-decoration: none; }
  details.src a:hover { text-decoration: underline; }

  .tip { position: fixed; z-index: 30; pointer-events: none; background: var(--panel); color: var(--fg);
    border: 1px solid var(--border); font-family: var(--font-mono); font-size: .7rem; padding: .4rem .55rem;
    border-radius: 3px; max-width: 240px; opacity: 0; transition: opacity .12s ease; }
  .tip.show { opacity: 1; }
  .tip b { display: block; font-size: .78rem; color: var(--white); margin-bottom: .12rem; }
  .tip .dom { text-transform: uppercase; letter-spacing: .06em; color: var(--accent); font-size: .62rem; }
  .tip .sum { font-family: var(--font-sans); color: var(--muted); margin-top: .3rem; }

  @media (max-width: 720px) {
    /* Header: just the centred title + the speculative toggle. */
    .topbar { flex-direction: column; align-items: center; gap: .55rem; }
    .brand { text-align: center; }
    .brand p { display: none; }
    .controls { margin: 0; align-items: center; }
    #spec { height: 34px; }
    #zin, #zout { display: none; }                 /* redundant on mobile — keep only fit-to-screen */
    /* Search magnifier + fit button share the bottom-right. The search expands to a bar at the *top*
       on tap, so the on-screen keyboard never covers it. */
    .zoomdock { left: auto; right: 1.15rem; bottom: 1.15rem; }
    .controls:not(.open) .search { position: fixed; right: 3.95rem; bottom: 1.15rem; z-index: 20; }
    .controls:not(.open) .search .mag { position: static; transform: none; width: 40px; height: 34px;
      border: 1px solid var(--border-2); border-radius: 3px; color: var(--muted); }
    .controls:not(.open) .search .mag:hover { color: var(--accent); border-color: var(--accent); }
    .controls:not(.open) .search input { display: none; }
    .controls.open .search { position: fixed; top: .8rem; left: 1.15rem; right: 1.15rem; z-index: 22; }
    .controls.open .search input { display: block; width: 100%; min-width: 0; opacity: 1;
      padding: .5rem .7rem .5rem 2.1rem; }
    .controls.open #spec { display: none; }
    .legend { display: none; }
    .card { top: auto; bottom: 0; right: 0; left: 0; width: 100%; max-height: 64vh; border-radius: 0;
      border-left: 0; border-right: 0; border-bottom: 0; transform: translateY(112%); }
    .card.open { transform: none; }
    /* Hint at the bottom-left, clearing the two bottom-right buttons; same height + baseline. */
    .hint { left: .75rem; right: 7rem; bottom: 1.15rem; transform: none; max-width: none;
      min-height: 34px; flex-wrap: nowrap; white-space: nowrap; overflow: hidden; }
    body.card-open .zoomdock,
    body.card-open .controls:not(.open) .search { display: none; }   /* the card owns the corner */
  }
  @media (prefers-reduced-motion: reduce) { * { transition: none !important; animation: none !important; } }
</style>
</head>
<body>
<div class="stage">
  <svg id="map" viewBox="0 0 1000 1000" preserveAspectRatio="xMidYMid meet"
       role="img" aria-label="Knowledge-base map: domains as territories, statements as links">
    <defs>
      <pattern id="grid" width="26" height="26" patternUnits="userSpaceOnUse">
        <circle cx="1" cy="1" r="1" fill="#1c2942"></circle>
      </pattern>
    </defs>
    <rect x="-3000" y="-3000" width="6000" height="6000" fill="url(#grid)"></rect>
    <g id="territories"></g>
    <g id="edges"></g>
    <g id="dlabels"></g>
    <g id="route"></g>
    <g id="nodes"></g>
  </svg>
</div>

<div class="topbar">
  <div class="brand">
    <h1><span class="tl">&gt;</span> six-degree-bacon<span class="cursor">&#9612;</span></h1>
    <p>// a bird's-eye map of the knowledge base &mdash; every link true &amp; sourced, zero AI</p>
  </div>
  <div class="controls" id="controls">
    <div class="search">
      <button type="button" class="mag" id="magbtn" aria-label="Search a topic">
        <svg viewBox="0 0 24 24" stroke-width="2.2"><circle cx="11" cy="11" r="7"></circle><path d="M21 21l-4.3-4.3"></path></svg>
      </button>
      <input id="q" type="text" placeholder="search a topic&hellip;" autocomplete="off" spellcheck="false">
      <div class="suggest" id="suggest"></div>
    </div>
    <button class="pill" id="spec" aria-pressed="false" title="Include speculative, low-confidence routes">+ speculative</button>
  </div>
</div>

<div class="zoomdock">
  <button class="iconbtn" id="zin" aria-label="Zoom in">+</button>
  <button class="iconbtn" id="zout" aria-label="Zoom out">&#8722;</button>
  <button class="iconbtn" id="zfit" title="Fit whole map" aria-label="Fit whole map"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 4h6v6"></path><path d="M10 20H4v-6"></path></svg></button>
</div>

<div class="legend" id="legend">
  <h4>// realms</h4>
  <div id="legend-rows"></div>
  <div class="row route-row"><span class="tealdot"></span> discovered route</div>
</div>

<div class="hint" id="hint"><span class="lbl">loading map&hellip;</span></div>

<aside class="card" id="card" aria-live="polite">
  <button class="cardbtn" id="cardmin" aria-label="Minimize">&#8211;</button>
  <button class="close" id="cardclose" aria-label="Close">&#10005;</button>
  <div id="cardbody"></div>
</aside>

<div class="tip" id="tip"></div>

<script>
"use strict";
const $ = (s) => document.querySelector(s);
const svg = $("#map");

// realm taxonomy — display-only grouping of the 10 domains into 5 tinted regions (never touches scoring)
const REALM = { geography: "world", trade: "world", culture: "expression", art: "expression",
  science: "knowledge", language: "knowledge", history: "power", genealogy: "power",
  myth: "belief", religion: "belief" };
const REALM_LABEL = { world: "World", expression: "Expression", knowledge: "Knowledge", power: "Power", belief: "Belief" };
const REALM_DOMAINS = { world: ["geography", "trade"], expression: ["culture", "art"],
  knowledge: ["science", "language"], power: ["history", "genealogy"], belief: ["myth", "religion"] };
// `other` (unmapped harvest fallout, ADR 0032) has no realm by design, and is absent from the
// legend: it is the absence of a classification, not a sixth kind of thing. Anything unmapped tints
// neutral grey rather than silently borrowing a realm's colour, which is what `culture` used to do.
const realmOf = (dom) => REALM[dom] || "unclassified";

// Escape for HTML/SVG text + attribute values (the map is built as innerHTML strings).
const xml = (s) => String(s == null ? "" : s).replace(/&/g, "&amp;").replace(/</g, "&lt;")
  .replace(/>/g, "&gt;").replace(/"/g, "&quot;");
const cap = (s) => s.charAt(0).toUpperCase() + s.slice(1);

// ---- dual mode: a prebuilt ./data.json (static host) or the live /api server ----
const staticReady = fetch("./data.json").then((r) => (r.ok ? r.json() : null)).catch(() => null);

async function getGraph() {
  const S = await staticReady;
  if (S) return S.graph;
  const r = await fetch("/api/graph");
  return r.json();
}
async function getResult(node, possibly) {
  const S = await staticReady;
  if (S) {
    const entry = S.results[node.id];

// ================= state =================
let NODES = [], byId = new Map(), nodeEl = new Map(), edgeByKey = new Map();

// ================= convex hull (monotone chain) =================
function hull(pts) {
  if (pts.length <= 2) return pts.slice();
  const p = pts.slice().sort((a, b) => a.x - b.x || a.y - b.y);
  const cr = (o, a, b) => (a.x - o.x) * (b.y - o.y) - (a.y - o.y) * (b.x - o.x);
  const lo = [], up = [];
  for (const q of p) { while (lo.length >= 2 && cr(lo[lo.length - 2], lo[lo.length - 1], q) <= 0) lo.pop(); lo.push(q); }
  for (let i = p.length - 1; i >= 0; i--) { const q = p[i];
    while (up.length >= 2 && cr(up[up.length - 2], up[up.length - 1], q) <= 0) up.pop(); up.push(q); }
  lo.pop(); up.pop(); return lo.concat(up);
}

// ================= render the map (built as innerHTML strings — no namespaced DOM calls) =================

    if (ns.length === 1) {

    } else if (ns.length === 2) {

      + `<circle class="hit" cx="${n.x}" cy="${n.y}" r="${hit}"></circle>`

  }).join("");

  $("#legend-rows").innerHTML = Object.entries(REALM_DOMAINS).map(([realm, doms]) =>

    + `<span style="color:var(--faint)">&middot; ${doms.join(", ")}</span></div>`).join("");

// ================= pan / zoom (aspect-matched viewBox; one pointer model) =================

  if (e.key === "ArrowDown") { e.preventDefault(); sugIdx = Math.min(sugItems.length - 1, sugIdx + 1); markSug(); }
  else if (e.key === "ArrowUp") { e.preventDefault(); sugIdx = Math.max(0, sugIdx - 1); markSug(); }
  else if (e.key === "Enter") { e.preventDefault(); pick(sugItems[Math.max(0, sugIdx)].id); }
  else if (e.key === "Escape") suggest.classList.remove("open");
});
function markSug() { suggest.querySelectorAll("button").forEach((b, i) => b.classList.toggle("active", i === sugIdx)); }
document.addEventListener("click", (e) => { if (!e.target.closest(".search")) suggest.classList.remove("open"); });

// Collapsed-to-icon search on mobile: tap the magnifier to expand the field; blurring it (empty)
// collapses back. On desktop the field is always shown, so the button just focuses it.
const controls = $("#controls"), magbtn = $("#magbtn");
magbtn.addEventListener("click", () => { controls.classList.add("open"); q.focus(); });
q.addEventListener("blur", () => setTimeout(() => {
  if (document.activeElement !== q) controls.classList.remove("open");
}, 150));

// ================= speculative toggle =================
$("#spec").onclick = () => {
  possibly = !possibly;
  $("#spec").setAttribute("aria-pressed", String(possibly));
  if (selected) select(byId.get(selected), kind);
};

// ================= boot =================
getGraph().then(renderMap).catch(() => {
  $("#hint").innerHTML = '<span class="lbl">could not load the map</span>';
});
window.addEventListener("resize", () => {
  // Keep the viewBox aspect equal to the container's (about its centre), so it never letterboxes.
  const cx = VB.x + VB.w / 2, cy = VB.y + VB.h / 2;
  VB.h = VB.w * aspect();
  VB.x = cx - VB.w / 2; VB.y = cy - VB.h / 2;
  applyVB();
});
</script>
</body>

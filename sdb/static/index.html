<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Six Degree Bacon</title>
<style>
  :root {
    --bg: #fbfaf7; --fg: #1c1a17; --muted: #6b6459; --card: #ffffff; --line: #e7e2d8;
    --accent: #9a5b2e; --accent-soft: #f0e6da; --good: #3f7d54; --warn: #b06a1f;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #171512; --fg: #ece7df; --muted: #9a9083; --card: #201d19;
      --line: #322d26; --accent: #d9945c; --accent-soft: #2a2119; --good: #6bbf88; --warn: #e0a35c;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--fg); line-height: 1.55;
    font-family: ui-serif, Georgia, "Times New Roman", serif;
  }
  .wrap { max-width: 820px; margin: 0 auto; padding: 2.2rem 1.1rem 4rem; }
  header h1 { font-size: 1.9rem; margin: 0 0 .2rem; letter-spacing: -.01em; }
  header p { color: var(--muted); margin: 0 0 1.4rem; font-size: 1.02rem; }
  form { display: flex; flex-wrap: wrap; gap: .55rem; align-items: center; }
  input[type=text] {
    flex: 1 1 15rem; padding: .7rem .85rem; font-size: 1.05rem; color: var(--fg);
    background: var(--card); border: 1px solid var(--line); border-radius: 9px; font-family: inherit;
  }
  input[type=text]:focus { outline: 2px solid var(--accent); border-color: var(--accent); }
  select, button {
    padding: .7rem .8rem; font-size: .95rem; border-radius: 9px; border: 1px solid var(--line);
    background: var(--card); color: var(--fg); font-family: inherit; cursor: pointer;
  }
  button.go { background: var(--accent); color: #fff; border-color: var(--accent); font-weight: 600; }
  button.go:hover { filter: brightness(1.06); }
  .opts {
    display: flex; flex-wrap: wrap; gap: 1rem; align-items: center; margin: .7rem 0 .2rem;
    color: var(--muted); font-size: .9rem; font-family: ui-sans-serif, system-ui, sans-serif;
  }
  .opts label { display: inline-flex; gap: .35rem; align-items: center; cursor: pointer; }
  .chips {
    margin: .9rem 0 0; display: flex; flex-wrap: wrap; gap: .4rem;
    font-family: ui-sans-serif, system-ui, sans-serif;
  }
  .chip {
    padding: .3rem .65rem; font-size: .84rem; border-radius: 999px; cursor: pointer;
    background: var(--accent-soft); color: var(--accent); border: 1px solid transparent;
  }
  .chip:hover { border-color: var(--accent); }
  #status {
    margin: 1.4rem 0 0; color: var(--muted); min-height: 1.2rem;
    font-family: ui-sans-serif, system-ui, sans-serif; font-size: .95rem;
  }
  .section-label {
    margin: 2rem 0 .6rem; font-size: .78rem; letter-spacing: .09em; text-transform: uppercase;
    color: var(--muted); font-family: ui-sans-serif, system-ui, sans-serif;
  }
  .card {
    background: var(--card); border: 1px solid var(--line); border-radius: 13px;
    padding: 1.15rem 1.25rem; margin: .7rem 0;
  }
  .card h3 { margin: 0 0 .1rem; font-size: 1.25rem; }
  .card h3 .to { color: var(--accent); }
  .hopcount {
    color: var(--muted); font-size: .85rem; font-family: ui-sans-serif, system-ui, sans-serif;
  }
  .chain { list-style: none; margin: .8rem 0 .2rem; padding: 0; }
  .chain li { padding: .1rem 0 .1rem 1.1rem; position: relative; }
  .chain li:before { content: "\2192"; position: absolute; left: 0; color: var(--accent); }
  .chain .node { font-weight: 600; }
  .chain .phrase { color: var(--muted); font-size: .9rem; }
  .chain li.start:before { content: ""; }
  .chain li.start { padding-left: 0; font-weight: 600; }
  .til { margin: .9rem 0 .3rem; font-style: italic; color: var(--fg); }
  .meters {
    display: flex; flex-wrap: wrap; gap: 1.3rem; margin: .8rem 0 .2rem;
    font-family: ui-sans-serif, system-ui, sans-serif; font-size: .82rem; color: var(--muted);
  }
  .meter { min-width: 8.5rem; }
  .bar {
    height: 7px; border-radius: 5px; background: var(--accent-soft); margin-top: .28rem;
    overflow: hidden;
  }
  .bar > span { display: block; height: 100%; background: var(--good); }
  .badge {
    display: inline-block; margin-left: .5rem; padding: .05rem .5rem; border-radius: 999px;
    background: var(--accent-soft); color: var(--warn); font-size: .72rem; vertical-align: middle;
    font-family: ui-sans-serif, system-ui, sans-serif;
  }
  details.sources {
    margin-top: .8rem; font-family: ui-sans-serif, system-ui, sans-serif; font-size: .85rem;
  }
  details.sources summary { cursor: pointer; color: var(--muted); }
  details.sources ul { margin: .5rem 0 0; padding-left: 1.1rem; }
  details.sources a { color: var(--accent); }
  footer {
    margin-top: 3rem; color: var(--muted); font-size: .82rem; text-align: center;
    font-family: ui-sans-serif, system-ui, sans-serif;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Six Degree Bacon</h1>
    <p>Type a topic &rarr; a surprising, <strong>true, sourced</strong> chain to somewhere unexpected.
       No AI in the loop &mdash; every score is deterministic.</p>
  </header>

  <form id="form">
    <input type="text" id="topic" placeholder="e.g. Roman Empire" autocomplete="off" autofocus>
    <select id="archetype" title="Result type">
      <option value="both">Both</option>
      <option value="journey">Journey</option>
      <option value="unlikely">Improbable pair</option>
    </select>
    <button class="go" type="submit">Discover</button>
  </form>
  <div class="opts">
    <label><input type="checkbox" id="possibly"> include speculative (low-confidence) paths</label>
  </div>
  <div class="chips" id="examples"></div>

  <div id="status"></div>
  <div id="results"></div>

  <footer>Deterministic &middot; zero-LLM &middot; reproducible by hand. Every link carries its sources.</footer>
</div>

<script>
const EXAMPLES = ["Roman Empire", "Christianity", "Euclid", "Silk Road", "Buddhism", "Trojan War"];
const $ = (id) => document.getElementById(id);

function esc(s) {
  const d = document.createElement("div"); d.textContent = s; return d.innerHTML;
}
function pct(x) { return Math.round(Math.max(0, Math.min(1, x)) * 100); }

function chainHtml(card) {
  const parts = ['<ul class="chain">', '<li class="start">' + esc(card.topic) + '</li>'];
  for (const h of card.chain) {
    parts.push('<li><span class="phrase">(' + esc(h.phrase) + ')</span> '
      + '<span class="node">' + esc(h.to) + '</span></li>');
  }
  parts.push('</ul>');
  return parts.join("");
}

function sourcesHtml(card) {
  const items = card.sources.map(s => {
    const label = esc(s.id) + ' <span style="opacity:.7">(' + esc(s.type) + ')</span>';
    return '<li>' + (s.url
      ? '<a href="' + esc(s.url) + '" target="_blank" rel="noopener">' + label + '</a>'
      : label) + '</li>';
  }).join("");
  const n = card.sources.length;
  return '<details class="sources"><summary>' + n + ' source' + (n === 1 ? '' : 's')
    + '</summary><ul>' + items + '</ul></details>';
}

function cardHtml(card, kind) {
  const scoreLabel = kind === "unlikely" ? "improbability" : "surprise";
  const scoreVal = kind === "unlikely" ? card.endpoint_unexpectedness : card.surprise;
  const badge = card.possibly ? '<span class="badge">speculative</span>' : '';
  return '<div class="card">'
    + '<h3>' + esc(card.topic) + ' <span style="opacity:.5">&rarr;</span> '
      + '<span class="to">' + esc(card.endpoint) + '</span>' + badge + '</h3>'
    + '<div class="hopcount">' + card.hops + ' hop' + (card.hops === 1 ? '' : 's') + '</div>'
    + chainHtml(card)
    + '<p class="til">' + esc(card.til) + '</p>'
    + '<div class="meters">'
      + '<div class="meter">trust ' + pct(card.trust) + '%<div class="bar"><span style="width:'
        + pct(card.trust) + '%"></span></div></div>'
      + '<div class="meter">' + scoreLabel + ' ' + scoreVal + '</div>'
    + '</div>'
    + sourcesHtml(card)
    + '</div>';
}

function sectionHtml(title, cards, kind) {
  if (!cards || !cards.length) return '';
  return '<div class="section-label">' + title + '</div>' + cards.map(c => cardHtml(c, kind)).join("");
}

// Static mode (e.g. GitHub Pages): a prebuilt ./data.json; else the live /api/discover server.
const staticReady = fetch("./data.json").then(r => r.ok ? r.json() : null).catch(() => null);

function staticLookup(S, topic, archetype, possibly) {
  const needle = topic.trim().toLowerCase();
  const hit = S.index.find(e => [e.id, e.label, e.qid, ...(e.aliases || [])]
    .filter(Boolean).some(v => v.toLowerCase() === needle));
  if (!hit) {
    const sug = S.index.filter(e => e.label.toLowerCase().includes(needle))
      .slice(0, 3).map(e => e.label);
    return { topic, error: "not_found", suggestions: sug };
  }
  const r = S.results[hit.id][possibly ? "loose" : "strict"];
  const results = {};
  if (archetype === "both" || archetype === "journey") results.journey = r.journey;
  if (archetype === "both" || archetype === "unlikely") results.unlikely = r.unlikely;
  return { topic, results };
}

async function getData(topic, archetype, possibly) {
  const S = await staticReady;
  if (S) return staticLookup(S, topic, archetype, possibly);
  const q = new URLSearchParams({ topic, archetype, include_possibly: possibly, top: "3" });
  const resp = await fetch("/api/discover?" + q.toString());
  return resp.json();
}

async function run(topic) {
  const status = $("status"), results = $("results");
  results.innerHTML = "";
  if (!topic.trim()) { status.textContent = "Enter a topic to begin."; return; }
  status.textContent = "Searching…";
  let data;
  try {
    data = await getData(topic, $("archetype").value, $("possibly").checked);
  } catch (e) { status.textContent = "Request failed: " + e; return; }

  if (data.error === "not_found") {
    status.innerHTML = 'No topic <strong>' + esc(topic) + '</strong>. '
      + (data.suggestions && data.suggestions.length
        ? 'Did you mean: ' + data.suggestions.map(s =>
            '<span class="chip" data-topic="' + esc(s) + '">' + esc(s) + '</span>').join(" ")
        : '');
    wireChips();
    return;
  }
  const res = data.results || {};
  const html = sectionHtml("The journey — a long, surprising chain", res.journey, "journey")
    + sectionHtml("The improbable pair — worlds apart, one short hop", res.unlikely, "unlikely");
  if (!html) {
    status.innerHTML = 'No confident connection for <strong>' + esc(topic)
      + '</strong>. Try ticking &ldquo;include speculative&rdquo;.';
    return;
  }
  status.textContent = "";
  results.innerHTML = html;
}

function wireChips() {
  document.querySelectorAll(".chip").forEach(c => c.onclick = () => {
    $("topic").value = c.dataset.topic; run(c.dataset.topic);
  });
}

$("examples").innerHTML = EXAMPLES.map(t =>
  '<span class="chip" data-topic="' + esc(t) + '">' + esc(t) + '</span>').join("");
wireChips();
$("form").addEventListener("submit", (e) => { e.preventDefault(); run($("topic").value); });
</script>
</body>
</html>
